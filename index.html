<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ViralHooks AI</title><meta name="description" content="Generate viral content ideas and hooks instantly."><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-4">ViralHooks AI</h1><p class="text-gray-600 mb-6">Unleash viral content ideas &amp; hooks!</p><input type="text" id="keywords" class="w-full p-3 border border-gray-300 rounded mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter keywords or niche (e.g., 'fitness tips', 'tech reviews')"><button id="generateBtn" class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition duration-300">Generate Ideas</button><div id="output" class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded text-left hidden"></div><button id="copyBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition duration-300 mt-4 hidden">Copy to Clipboard</button><script>const generateBtn = document.getElementById('generateBtn'); const keywordsInput = document.getElementById('keywords'); const outputDiv = document.getElementById('output'); const copyBtn = document.getElementById('copyBtn'); generateBtn.onclick = async () => { const keywords = keywordsInput.value; if (!keywords) { alert('Please enter keywords!'); return; } outputDiv.classList.remove('hidden'); outputDiv.innerHTML = '<p class="text-gray-500">Generating ideas...</p>'; copyBtn.classList.add('hidden'); try { const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keywords }) }); const data = await res.json(); if (res.ok) { outputDiv.innerHTML = data.ideas.map(idea => `<p>${idea}</p>`).join(''); copyBtn.classList.remove('hidden'); } else { outputDiv.innerHTML = `<p class="text-red-500">Error: ${data.error || 'Failed to generate ideas.'}</p>`; } } catch (e) { outputDiv.innerHTML = `<p class="text-red-500">Error: ${e.message}</p>`; } }; copyBtn.onclick = () => { navigator.clipboard.writeText(outputDiv.innerText); alert('Copied to clipboard!'); };</script></div></body></html>
